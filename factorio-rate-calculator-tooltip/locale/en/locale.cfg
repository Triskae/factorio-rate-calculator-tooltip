[mod-setting-name]
factorio-rate-calculator-tooltip-recipe-tooltip-time-unit=Recipe tooltip rate unit (requires reload)
factorio-rate-calculator-tooltip-live-tooltip-time-unit=Machine hover panel rate unit
factorio-rate-calculator-tooltip-show-belt-fill-targets=Show machines needed to fill a belt

[mod-setting-description]
factorio-rate-calculator-tooltip-recipe-tooltip-time-unit=Unit used in the static recipe tooltip fields generated when Factorio loads prototypes. Changing this requires applying startup settings and reloading the game.
factorio-rate-calculator-tooltip-live-tooltip-time-unit=Unit used in the live panel shown while hovering a crafting machine. This is a per-player setting and can be changed in game.
factorio-rate-calculator-tooltip-show-belt-fill-targets=Shows how many identical machines are needed to fill a yellow, red, or blue belt with each solid output in the hover panel.

