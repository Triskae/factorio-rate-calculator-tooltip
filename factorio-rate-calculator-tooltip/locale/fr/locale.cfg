[mod-setting-name]
factorio-rate-calculator-tooltip-recipe-tooltip-time-unit=Unité des taux dans les infobulles de recettes (rechargement requis)
factorio-rate-calculator-tooltip-live-tooltip-time-unit=Unité des taux dans le panneau au survol des machines
factorio-rate-calculator-tooltip-show-belt-fill-targets=Afficher les machines nécessaires pour remplir un tapis

[mod-setting-description]
factorio-rate-calculator-tooltip-recipe-tooltip-time-unit=Unité utilisée dans les champs statiques d'infobulle de recette générés quand Factorio charge les prototypes. Modifier ce réglage demande d'appliquer les réglages de démarrage et de recharger le jeu.
factorio-rate-calculator-tooltip-live-tooltip-time-unit=Unité utilisée dans le panneau affiché au survol d'une machine de production. Ce réglage est propre à chaque joueur et peut être modifié en jeu.
factorio-rate-calculator-tooltip-show-belt-fill-targets=Affiche dans le panneau au survol le nombre de machines identiques nécessaires pour remplir un tapis jaune, rouge ou bleu avec chaque sortie solide.

